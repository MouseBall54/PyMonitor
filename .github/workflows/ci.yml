name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-compatibility:
    name: CPython ${{ matrix.python-version }} Agent
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Install test dependency
        run: python -m pip install --disable-pip-version-check numpy
      - name: Run Agent tests
        shell: pwsh
        env:
          PYTHONPATH: ${{ github.workspace }}\agent
        run: python -m unittest discover -s tests\agent_tests -v

  windows-release:
    name: .NET, stability, portable, and MSI
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
      - name: Capture CPython 3.12
        shell: pwsh
        run: |
          $python = (Get-Command python).Source
          Add-Content $env:GITHUB_ENV "PYTHON312_EXECUTABLE=$python"
          Add-Content $env:GITHUB_ENV "PYTHON_EXECUTABLE=$python"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: x64
      - name: Capture CPython 3.14
        shell: pwsh
        run: "Add-Content $env:GITHUB_ENV \"PYTHON314_EXECUTABLE=$((Get-Command python).Source)\""
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Install integration dependency
        shell: pwsh
        run: "& $env:PYTHON312_EXECUTABLE -m pip install --disable-pip-version-check numpy"
      - name: Run .NET tests
        shell: pwsh
        run: dotnet test PyRuntimeInspector.slnx -c Release --nologo
      - name: Run release stability gate
        shell: pwsh
        run: .\scripts\Invoke-StabilityTests.ps1 -PythonExecutable $env:PYTHON312_EXECUTABLE -DurationSeconds 60 -Cycles 10
      - name: Build portable release
        shell: pwsh
        run: .\scripts\Build-PortableRelease.ps1 -SkipTests
      - name: Build MSI
        shell: pwsh
        run: .\scripts\Build-Installer.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: PyRuntimeInspector-unsigned
          if-no-files-found: error
          path: |
            artifacts/*.zip
            artifacts/*.sha256
            artifacts/installer/*.msi
            artifacts/installer/*.sha256
