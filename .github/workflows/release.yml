name: PyMonitor Signed Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
      - name: Capture CPython 3.12
        shell: pwsh
        run: |
          $python = (Get-Command python).Source
          Add-Content $env:GITHUB_ENV "PYTHON312_EXECUTABLE=$python"
          Add-Content $env:GITHUB_ENV "PYTHON_EXECUTABLE=$python"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: x64
      - name: Capture CPython 3.14
        shell: pwsh
        run: "Add-Content $env:GITHUB_ENV \"PYTHON314_EXECUTABLE=$((Get-Command python).Source)\""
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Capture and verify release version
        id: release_metadata
        shell: pwsh
        run: |
          [xml]$props = Get-Content -LiteralPath Directory.Build.props
          $version = $props.Project.PropertyGroup.Version
          $expectedTag = "v$version"
          Add-Content $env:GITHUB_ENV "PYMONITOR_VERSION=$version"
          Add-Content $env:GITHUB_OUTPUT "version=$version"
          if ($env:GITHUB_REF.StartsWith('refs/tags/') -and $env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Release tag $env:GITHUB_REF_NAME does not match product version $expectedTag."
          }
      - name: Require signing secrets
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERTIFICATE_BASE64 -or -not $env:CERTIFICATE_PASSWORD) {
            throw "Signed releases require WINDOWS_CERTIFICATE_BASE64 and WINDOWS_CERTIFICATE_PASSWORD."
          }
      - name: Install and verify test dependencies
        shell: pwsh
        run: |
          & $env:PYTHON312_EXECUTABLE -m pip install --disable-pip-version-check numpy pandas matplotlib
          & $env:PYTHON312_EXECUTABLE -c "import matplotlib, numpy, pandas"
      - name: Prepare signing certificate
        id: signing
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "release-signing.pfx"
          $publicCertificatePath = Join-Path $env:RUNNER_TEMP "release-signing.cer"
          $signingCertificate = $null
          $temporaryRootThumbprint = $null
          try {
            [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:CERTIFICATE_BASE64))
            $signingCertificate = [Security.Cryptography.X509Certificates.X509Certificate2]::new(
              $certificatePath,
              $env:CERTIFICATE_PASSWORD,
              [Security.Cryptography.X509Certificates.X509KeyStorageFlags]::EphemeralKeySet)
            if (-not $signingCertificate.HasPrivateKey) {
              throw "The release-signing PFX does not contain a private key."
            }

            $subjectName = [Convert]::ToHexString($signingCertificate.SubjectName.RawData)
            $issuerName = [Convert]::ToHexString($signingCertificate.IssuerName.RawData)
            $isSelfSigned = $subjectName -eq $issuerName
            Add-Content $env:GITHUB_OUTPUT "self_signed=$($isSelfSigned.ToString().ToLowerInvariant())"

            if ($isSelfSigned) {
              # signtool /pa must trust the chain while it verifies the signature. Add only
              # the public certificate to this ephemeral runner. certutil -f is explicitly
              # non-interactive, unlike certificate-store APIs that can wait for desktop UI.
              [IO.File]::WriteAllBytes(
                $publicCertificatePath,
                $signingCertificate.Export(
                  [Security.Cryptography.X509Certificates.X509ContentType]::Cert))
              & certutil.exe -user -addstore -f Root $publicCertificatePath
              if ($LASTEXITCODE -ne 0) {
                throw "The self-signed certificate could not be added to the runner trust store."
              }
              $temporaryRootThumbprint = $signingCertificate.Thumbprint
              Write-Host "Self-signed certificate detected; its public certificate is trusted only on this ephemeral runner."
            }
            Add-Content $env:GITHUB_OUTPUT "temporary_root_thumbprint=$temporaryRootThumbprint"
          }
          catch {
            if ($temporaryRootThumbprint) {
              & certutil.exe -user -delstore Root $temporaryRootThumbprint | Out-Null
            }
            Remove-Item -LiteralPath $certificatePath -Force -ErrorAction SilentlyContinue
            throw
          }
          finally {
            if ($signingCertificate) {
              $signingCertificate.Dispose()
            }
            Remove-Item -LiteralPath $publicCertificatePath -Force -ErrorAction SilentlyContinue
          }
      - name: Build, test, and sign release
        shell: pwsh
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "release-signing.pfx"
          $password = ConvertTo-SecureString $env:CERTIFICATE_PASSWORD -AsPlainText -Force
          Write-Host "Starting complete release build, test, packaging, and signing pipeline."
          .\scripts\Build-Release.ps1 `
            -CertificatePath $certificatePath `
            -CertificatePassword $password `
            -GitHubRepository $env:GITHUB_REPOSITORY
      - name: Remove temporary signing material
        if: always()
        shell: pwsh
        env:
          TEMPORARY_ROOT_THUMBPRINT: ${{ steps.signing.outputs.temporary_root_thumbprint }}
        run: |
          if ($env:TEMPORARY_ROOT_THUMBPRINT) {
            & certutil.exe -user -delstore Root $env:TEMPORARY_ROOT_THUMBPRINT
            if ($LASTEXITCODE -ne 0) {
              throw "The temporary self-signed root certificate could not be removed."
            }
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "release-signing.pfx"
          Remove-Item -LiteralPath $certificatePath -Force -ErrorAction SilentlyContinue
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          SELF_SIGNED: ${{ steps.signing.outputs.self_signed }}
        run: |
          $baseName = "PyMonitor-$env:PYMONITOR_VERSION-win-x64"
          $assets = @(
            "artifacts\$baseName.zip"
            "artifacts\$baseName.zip.sha256"
            "artifacts\installer\$baseName.msi"
            "artifacts\installer\$baseName.msi.sha256"
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path -LiteralPath $asset -PathType Leaf)) {
              throw "Signed release asset is missing: $asset"
            }
          }
          if ($env:SELF_SIGNED -eq "true") {
            gh release create $env:GITHUB_REF_NAME @assets `
              --verify-tag --generate-notes --prerelease `
              --title "PyMonitor $env:GITHUB_REF_NAME (internal self-signed)"
          }
          else {
            gh release create $env:GITHUB_REF_NAME @assets `
              --verify-tag --generate-notes --title "PyMonitor $env:GITHUB_REF_NAME"
          }
          if ($LASTEXITCODE -ne 0) { throw "GitHub release creation failed." }
      - uses: actions/upload-artifact@v4
        with:
          name: PyMonitor-signed
          if-no-files-found: error
          path: |
            artifacts/PyMonitor-${{ steps.release_metadata.outputs.version }}-win-x64.zip
            artifacts/PyMonitor-${{ steps.release_metadata.outputs.version }}-win-x64.zip.sha256
            artifacts/installer/PyMonitor-${{ steps.release_metadata.outputs.version }}-win-x64.msi
            artifacts/installer/PyMonitor-${{ steps.release_metadata.outputs.version }}-win-x64.msi.sha256
